
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANTOJAZO FOOD</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#0f0f12;
color:white;
}
header{
padding:30px 20px;
}
.hero{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
align-items:center;
}
.logo{
font-size:70px;
font-weight:800;
line-height:.95;
}
.logo span{
color:#ffb300;
}
.hero p{
font-size:18px;
color:#ddd;
}
.hero-image{
height:320px;
border-radius:30px;
overflow:hidden;
border:8px solid #ff5a0020;
}
.hero-image img{
width:100%;
height:100%;
object-fit:cover;
}
.search{
padding:0 20px 20px;
display:flex;
gap:15px;
}
.search input{
flex:1;
padding:18px;
border:none;
border-radius:18px;
font-size:16px;
}
.cart-box{
background:linear-gradient(135deg,#ffb300,#ff5a00);
padding:18px;
border-radius:18px;
font-weight:700;
color:#111;
}
.categories{
display:flex;
gap:10px;
padding:0 20px 20px;
overflow:auto;
}
.categories button{
border:none;
padding:12px 18px;
border-radius:999px;
background:#1d1d24;
color:white;
cursor:pointer;
font-weight:600;
}
.categories .active{
background:linear-gradient(135deg,#ffb300,#ff5a00);
color:#111;
}
.container{
display:grid;
grid-template-columns:1fr 350px;
gap:25px;
padding:0 20px 30px;
}
.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
gap:20px;
}
.card{
background:#17171d;
border-radius:28px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.25);
transition:.25s;
}
.card:hover{
transform:translateY(-5px);
}
.card img{
width:100%;
height:220px;
object-fit:cover;
}
.card-body{
padding:18px;
}
.card h3{
margin:0 0 8px;
font-size:22px;
}
.card p{
color:#bbb;
}
.price{
font-size:26px;
font-weight:800;
color:#ffb300;
margin-top:12px;
}
.card button{
width:100%;
margin-top:15px;
padding:14px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#ffb300,#ff5a00);
font-weight:700;
cursor:pointer;
}
aside{
background:#17171d;
padding:22px;
border-radius:28px;
height:max-content;
}
.notice{
background:#2b1d0d;
padding:14px;
border-radius:16px;
color:#ffcc70;
margin-top:15px;
}
aside input,aside textarea,aside select{
width:100%;
padding:14px;
border:none;
border-radius:14px;
margin-top:12px;
background:#20202a;
color:white;
font-family:'Poppins',sans-serif;
}
.whatsapp{
width:100%;
padding:16px;
margin-top:15px;
border:none;
border-radius:16px;
background:#25D366;
color:white;
font-weight:700;
font-size:16px;
cursor:pointer;
}
@media(max-width:950px){
.hero,.container{
grid-template-columns:1fr;
}
.logo{
font-size:52px;
}
}
</style>
</head>

<body>

<header>
<div class="hero">

<div>
<div style="background:#24190f;display:inline-block;padding:10px 18px;border-radius:999px;margin-bottom:20px;">
🍗 Delivery moderno
</div>

<div class="logo">
ANTOJAZO<br>
<span>FOOD</span>
</div>

<p>
Pollo broaster, hamburguesas, salchipapas, combos y más.
Sistema moderno y profesional.
</p>
</div>

<div class="hero-image">
<img src="https://images.unsplash.com/photo-1561758033-d89a9ad46330?q=80&w=1200&auto=format&fit=crop">
</div>

</div>
</header>

<section class="search">
<input type="text" id="searchInput" placeholder="Buscar pollo, hamburguesa, salchipapa..." onkeyup="searchProducts()">
<div class="cart-box">🛒 0</div>
</section>

<div class="categories" id="categories"></div>

<div class="container">

<main>
<div class="products" id="products"></div>
</main>

<aside>
<h2>🛒 Tu pedido</h2>

<div id="cart"></div>

<div class="notice">
🚧 Por ahora solo disponible recojo en local.
Delivery próximamente.
</div>

<input placeholder="Nombre">
<input placeholder="Celular">
<textarea placeholder="Referencia"></textarea>

<select>
<option>Recojo en local</option>
</select>

<button class="whatsapp">
Enviar pedido por WhatsApp
</button>

</aside>

</div>

<script>
const products=[
{
name:"Pollo Broaster 1/8",
category:"Pollo Broaster",
price:10,
img:"https://images.unsplash.com/photo-1626645738196-c2a7c87a8f58?w=1200"
},
{
name:"Pollo Broaster 1/4",
category:"Pollo Broaster",
price:16,
img:"https://images.unsplash.com/photo-1562967914-608f82629710?w=1200"
},
{
name:"Hamburguesa Clásica",
category:"Hamburguesas",
price:12,
img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=1200"
},
{
name:"Salchipapa Especial",
category:"Salchipapas",
price:14,
img:"https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=1200"
},
{
name:"Combo Broaster",
category:"Combos",
price:22,
img:"https://images.unsplash.com/photo-1606755962773-d324e0a13086?w=1200"
}
];

const categories=["Todo","Pollo Broaster","Hamburguesas","Salchipapas","Combos"];

function renderCategories(){
document.getElementById("categories").innerHTML=categories.map((c,i)=>`
<button class="${i===0?'active':''}" onclick="filterCategory('${c}',this)">${c}</button>
`).join("");
}

function renderProducts(list=products){
document.getElementById("products").innerHTML=list.map(p=>`
<div class="card">
<img src="${p.img}">
<div class="card-body">
<h3>${p.name}</h3>
<p>${p.category}</p>
<div class="price">S/ ${p.price.toFixed(2)}</div>
<button>Pedir ahora</button>
</div>
</div>
`).join("");
}

function searchProducts(){
const value=document.getElementById("searchInput").value.toLowerCase();

const filtered=products.filter(p=>
p.name.toLowerCase().includes(value)||
p.category.toLowerCase().includes(value)
);

renderProducts(filtered);
}

function filterCategory(category,btn){
document.querySelectorAll(".categories button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

if(category==="Todo"){
renderProducts(products);
return;
}

renderProducts(products.filter(p=>p.category===category));
}

renderCategories();
renderProducts();
</script>

</body>
</html>
